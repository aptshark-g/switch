apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      terminationGracePeriodSeconds: 35
      containers:
        - name: gateway
          image: gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: deepseek-api-key
                  optional: true
            - name: KIMI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: gateway-secrets
                  key: kimi-api-key
                  optional: true
          volumeMounts:
            - name: config
              mountPath: /app/provider.yaml
              subPath: provider.yaml
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
      volumes:
        - name: config
          configMap:
            name: gateway-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: gateway
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: gateway
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  provider.yaml: |
    providers:
      - name: deepseek
        kind: openai_compatible
        base_url: https://api.deepseek.com
        api_key: ${DEEPSEEK_API_KEY}
        models:
          - deepseek-chat
        enabled: true
        max_concurrency: 20
        rate_limit_rpm: 500
    server:
      host: "0.0.0.0"
      port: 8080
    defaults:
      timeout_ms: 60000
      max_retries: 2
    auth:
      enabled: true
      api_keys:
        - ${GATEWAY_API_KEY}
      admin_token: ${GATEWAY_ADMIN_TOKEN}
---
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secrets
type: Opaque
stringData:
  deepseek-api-key: ""
  kimi-api-key: ""
